<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuel · Учёт расхода топлива</title>
    <script>
      (function () {
        var s = localStorage.getItem('fuel-theme');
        document.documentElement.dataset.theme =
          s === 'light' || s === 'dark' ? s : 'dark';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
